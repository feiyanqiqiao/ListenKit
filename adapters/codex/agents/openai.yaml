version: 1
metadata:
  display_name: "Generate Markdown"
  short_description: "Generate plain transcript Markdown from an existing ListenKit transcript JSON file."
  default_prompt: "Use $generate-markdown to render an existing ListenKit transcript JSON file as plain transcript Markdown with cli/render-listening-note.py. Do not import audio, download media, run ASR transcription, or add learning-note templates, Obsidian, Anki, or review-system structures unless a downstream project explicitly asks."
