version: 1
metadata:
  display_name: "Generate Markdown"
  short_description: "Generate transcript Markdown and same-stem JSON from a URL or local audio/video file."
  default_prompt: "Use $generate-markdown to generate ListenKit transcript artifacts through cli/generate-markdown.sh. Accept exactly one input source: URL or local audio/video file. Require only --language and --output in addition to the input; let the wrapper derive ASR locale and the Markdown title unless the user requests an override. URL titles default to the video's platform title when available; local titles default to the source filename. For --output path/name.md, consume path/name.md as the readable transcript and path/name.json as the structured transcript artifact. Do not expose or call existing-audio, existing-transcript-JSON, subtitle extraction, ASR, import, rendering, raw yt-dlp, or tools/* workflows; those are ListenKit debugging and maintenance only. Do not add learning-note templates, Obsidian, Anki, or review-system structures unless a downstream project explicitly asks."
